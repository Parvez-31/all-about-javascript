<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }
    section {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    button {
      padding: 8px 20px;
      border: none;
      border-radius: 10px;
      margin: 10px;
      cursor: pointer;
    }
    .text {
      font-weight: bold;
    }
    .copy-code {
      /* background-color: yellow; */
      padding: 10px 15px;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 2px 2px 5px black;
    }
  </style>
  <body>
    <section>
      <div class="">
        <button id="btn1">#000000</button>
        <button id="btn2">#ffffff</button>
      </div>
      <div class="text">copy your code here</div>
      <div class="copy-code">
        background-image: linear-gradient(to right, #000000, #ffffff)
      </div>
    </section>

    <!-- js start -->
    <script>
      const btn1 = document.getElementById("btn1");
      const btn2 = document.getElementById("btn2");
      const copyCodeEl = document.querySelector(".copy-code");
      let rgb1 = "#000000";
      let rgb2 = "#ffffff";

      const hexValue = () => {
        let color = "#";
        let hexNumbers = "0123456789abcdef";
        for (let i = 0; i < 6; i++) {
          let value = Math.floor(Math.random() * hexNumbers.length);
          color = color + hexNumbers[value];
        }
        return color;
      };

      const handleButton1 = () => {
        rgb1 = hexValue();
        btn1.innerText = rgb1;
        // console.log(rgb1);
        document.body.style.backgroundImage = `linear-gradient(to right, ${rgb1}, ${rgb2})`;
        copyCodeEl.innerHTML = `background-image: linear-gradient(to right, ${rgb1}, ${rgb2})`;
      };

      const handleButton2 = () => {
        rgb2 = hexValue();
        btn2.innerText = rgb2;
        // console.log(rgb2);
        document.body.style.backgroundImage = `linear-gradient(to right, ${rgb1}, ${rgb2})`;
        copyCodeEl.innerHTML = `background-image: linear-gradient(to right, ${rgb1}, ${rgb2})`;
      };
      btn1.addEventListener("click", handleButton1);
      btn2.addEventListener("click", handleButton2);
      copyCodeEl.addEventListener("click", () => {
        // console.log("hello");
        navigator.clipboard.writeText(copyCodeEl.innerText);
      });
    </script>
  </body>
</html>
